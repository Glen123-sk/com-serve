<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>COM-SERVE Forgot Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Space+Grotesk:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="forgot-password">
  <div class="bg-layer">
    <div class="orb orb-a"></div>
    <div class="orb orb-b"></div>
    <div class="orb orb-c"></div>
  </div>

  <div id="toastContainer" class="toast-container"></div>

  <main class="landing-shell">
    <section class="landing-auth panel auth-glass" style="max-width: 640px; margin: 0 auto;">
      <div class="auth-title">
        <h2>Reset Password</h2>
        <p class="muted">Recover household access only.</p>
      </div>

      <form id="forgotPasswordForm" class="card login-card" style="padding: 1rem;">
        <label for="resetEmail">Registered Email</label>
        <input id="resetEmail" type="email" placeholder="name@example.com" required />
        <small class="helper-text">Use the same email you used during registration.</small>

        <label for="resetNewPassword">New Password</label>
        <input id="resetNewPassword" type="password" placeholder="New password" required />

        <label for="resetConfirmPassword">Confirm New Password</label>
        <input id="resetConfirmPassword" type="password" placeholder="Confirm password" required />

        <button class="btn btn-primary" type="submit">Reset Password</button>
        <a href="index.html" class="tiny-link">Back to login</a>
      </form>

      <p id="forgotMessage" class="message"></p>
    </section>
  </main>

  <footer class="page-footer public-footer">COM-SERVE | Community Funeral Contribution System</footer>

  <script src="script.js"></script>
</body>
</html>
